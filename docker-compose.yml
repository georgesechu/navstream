services:
  # NavStream App (Next.js)
  navstream-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://navstream:navstream@postgres:5432/navstream
      - MQTT_URL=mqtt://mosquitto:1883
      - GO2RTC_API=http://go2rtc:1984
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # PostgreSQL + PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: navstream
      POSTGRES_USER: navstream
      POSTGRES_PASSWORD: navstream
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navstream"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # go2rtc — media gateway (RTSP → WebRTC)
  go2rtc:
    image: alexxit/go2rtc:latest
    ports:
      - "1984:1984"   # Admin API
      - "8555:8555"   # WHEP/WebRTC signaling
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
      - ./media:/media
    restart: unless-stopped

  # Mosquitto — MQTT broker for sensor data
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  # Caddy — reverse proxy with auto-TLS
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - navstream-app
      - go2rtc
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
