<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <pattern id="grid-fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#1e274410" stroke-width="0.5"/>
    </pattern>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0a0e1a"/>
  <rect width="800" height="500" fill="url(#grid-fine)"/>

  <!-- Outer perimeter -->
  <rect x="20" y="20" width="760" height="460" rx="2" fill="none" stroke="#2a3555" stroke-width="2"/>
  <rect x="30" y="30" width="740" height="440" rx="2" fill="none" stroke="#1e274480" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ===== TANK FARM (left, 3 large tanks) ===== -->
  <rect x="40" y="40" width="250" height="250" rx="1" fill="#00e5ff08" stroke="#2a3555" stroke-width="1.5"/>
  <text x="165" y="58" font-family="monospace" font-size="10" fill="#5a7aa0" text-anchor="middle">TANK FARM</text>
  <!-- LNG Tank 1 -->
  <circle cx="100" cy="120" r="35" fill="none" stroke="#00e5ff30" stroke-width="1.5"/>
  <circle cx="100" cy="120" r="30" fill="#00e5ff05" stroke="#00e5ff20" stroke-width="0.8"/>
  <text x="100" y="117" font-family="monospace" font-size="7" fill="#00e5ff80" text-anchor="middle">LNG-1</text>
  <text x="100" y="127" font-family="monospace" font-size="5" fill="#3d5575" text-anchor="middle">160K m³</text>
  <!-- Tank level indicator -->
  <rect x="133" y="100" width="4" height="40" rx="1" fill="none" stroke="#3d5575" stroke-width="0.5"/>
  <rect x="134" y="110" width="2" height="30" rx="0.5" fill="#00e5ff30"/>
  <text x="140" y="135" font-family="monospace" font-size="4" fill="#3d5575">78%</text>

  <!-- LNG Tank 2 -->
  <circle cx="215" cy="120" r="35" fill="none" stroke="#00e5ff30" stroke-width="1.5"/>
  <circle cx="215" cy="120" r="30" fill="#00e5ff05" stroke="#00e5ff20" stroke-width="0.8"/>
  <text x="215" y="117" font-family="monospace" font-size="7" fill="#00e5ff80" text-anchor="middle">LNG-2</text>
  <text x="215" y="127" font-family="monospace" font-size="5" fill="#3d5575" text-anchor="middle">160K m³</text>
  <rect x="248" y="100" width="4" height="40" rx="1" fill="none" stroke="#3d5575" stroke-width="0.5"/>
  <rect x="249" y="115" width="2" height="25" rx="0.5" fill="#00e5ff30"/>
  <text x="255" y="135" font-family="monospace" font-size="4" fill="#3d5575">62%</text>

  <!-- LNG Tank 3 -->
  <circle cx="155" cy="220" r="35" fill="none" stroke="#00e5ff30" stroke-width="1.5"/>
  <circle cx="155" cy="220" r="30" fill="#00e5ff05" stroke="#00e5ff20" stroke-width="0.8"/>
  <text x="155" y="217" font-family="monospace" font-size="7" fill="#00e5ff80" text-anchor="middle">LNG-3</text>
  <text x="155" y="227" font-family="monospace" font-size="5" fill="#3d5575" text-anchor="middle">160K m³</text>
  <rect x="188" y="200" width="4" height="40" rx="1" fill="none" stroke="#3d5575" stroke-width="0.5"/>
  <rect x="189" y="205" width="2" height="35" rx="0.5" fill="#22c55e30"/>
  <text x="195" y="235" font-family="monospace" font-size="4" fill="#3d5575">91%</text>

  <!-- Bund wall around tank farm -->
  <rect x="50" y="70" width="225" height="210" rx="3" fill="none" stroke="#3d5575" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="62" y="83" font-family="monospace" font-size="4" fill="#3d5575">BUND WALL</text>

  <!-- ===== PIPE RACK (connecting tank farm to process area) ===== -->
  <rect x="290" y="80" width="30" height="200" rx="0" fill="#0d1525" stroke="#1e274480" stroke-width="0.5"/>
  <text x="305" y="180" font-family="monospace" font-size="6" fill="#2a3555" text-anchor="middle" transform="rotate(90, 305, 180)" letter-spacing="2">PIPE RACK</text>
  <!-- Pipes inside rack -->
  <line x1="295" y1="80" x2="295" y2="280" stroke="#00e5ff15" stroke-width="3"/>
  <line x1="305" y1="80" x2="305" y2="280" stroke="#ff444415" stroke-width="3"/>
  <line x1="315" y1="80" x2="315" y2="280" stroke="#ffd60015" stroke-width="3"/>

  <!-- ===== PROCESS AREA (center-right) ===== -->
  <rect x="330" y="40" width="200" height="130" rx="1" fill="#00e5ff08" stroke="#2a3555" stroke-width="1.5"/>
  <text x="430" y="58" font-family="monospace" font-size="9" fill="#5a7aa0" text-anchor="middle">LIQUEFACTION TRAIN</text>
  <!-- Heat exchangers -->
  <g transform="translate(370, 95)">
    <rect x="-20" y="-20" width="40" height="40" rx="2" fill="none" stroke="#3d5575" stroke-width="1"/>
    <line x1="-15" y1="-15" x2="15" y2="15" stroke="#3d5575" stroke-width="0.5"/>
    <line x1="-15" y1="-10" x2="10" y2="15" stroke="#3d5575" stroke-width="0.5"/>
    <line x1="-10" y1="-15" x2="15" y2="10" stroke="#3d5575" stroke-width="0.5"/>
  </g>
  <text x="370" y="125" font-family="monospace" font-size="5" fill="#3d5575" text-anchor="middle">HEAT EXCH.</text>
  <!-- Compressor -->
  <g transform="translate(440, 95)">
    <rect x="-18" y="-15" width="36" height="30" rx="2" fill="none" stroke="#5a7aa0" stroke-width="1"/>
    <circle r="10" fill="none" stroke="#5a7aa0" stroke-width="0.8"/>
    <path d="M-5,-5 L5,0 L-5,5" fill="#5a7aa040" stroke="none"/>
  </g>
  <text x="440" y="125" font-family="monospace" font-size="5" fill="#5a7aa0" text-anchor="middle">COMPRESSOR</text>
  <!-- Separator -->
  <g transform="translate(500, 95)">
    <ellipse rx="12" ry="20" fill="none" stroke="#3d5575" stroke-width="1"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#3d5575" stroke-width="0.5"/>
  </g>
  <text x="500" y="125" font-family="monospace" font-size="5" fill="#3d5575" text-anchor="middle">SEPARATOR</text>
  <!-- Inlet manifold -->
  <line x1="335" y1="145" x2="525" y2="145" stroke="#3d557560" stroke-width="2"/>
  <text x="430" y="158" font-family="monospace" font-size="4" fill="#3d5575" text-anchor="middle">INLET MANIFOLD</text>

  <!-- ===== FLARE STACK (top-right) ===== -->
  <g transform="translate(600, 65)">
    <line x1="0" y1="60" x2="0" y2="0" stroke="#ff666680" stroke-width="3"/>
    <line x1="-10" y1="60" x2="0" y2="30" stroke="#ff444040" stroke-width="1"/>
    <line x1="10" y1="60" x2="0" y2="30" stroke="#ff444040" stroke-width="1"/>
    <!-- Flame -->
    <path d="M-6,0 Q-3,-12 0,-15 Q3,-12 6,0" fill="#ff444030" stroke="#ff666660" stroke-width="0.8"/>
    <path d="M-3,-2 Q0,-10 3,-2" fill="#ffd60030" stroke="none"/>
  </g>
  <text x="600" y="135" font-family="monospace" font-size="6" fill="#ff666680" text-anchor="middle">FLARE</text>

  <!-- ===== CONTROL ROOM (center) ===== -->
  <rect x="330" y="180" width="140" height="90" rx="1" fill="#00e5ff10" stroke="#2a3555" stroke-width="1.5"/>
  <text x="400" y="198" font-family="monospace" font-size="9" fill="#5a7aa0" text-anchor="middle">CONTROL ROOM</text>
  <!-- DCS consoles -->
  <rect x="340" y="210" width="50" height="8" rx="1" fill="none" stroke="#3d5575" stroke-width="0.6"/>
  <rect x="340" y="225" width="50" height="8" rx="1" fill="none" stroke="#3d5575" stroke-width="0.6"/>
  <!-- Monitors -->
  <rect x="343" y="211" width="6" height="5" rx="0.5" fill="#3d5575" opacity="0.4"/>
  <rect x="353" y="211" width="6" height="5" rx="0.5" fill="#3d5575" opacity="0.4"/>
  <rect x="363" y="211" width="6" height="5" rx="0.5" fill="#3d5575" opacity="0.4"/>
  <rect x="373" y="211" width="6" height="5" rx="0.5" fill="#3d5575" opacity="0.4"/>
  <!-- Large display wall -->
  <rect x="400" y="205" width="55" height="30" rx="1" fill="none" stroke="#00e5ff20" stroke-width="0.8"/>
  <text x="427" y="224" font-family="monospace" font-size="5" fill="#00e5ff40" text-anchor="middle">DCS WALL</text>
  <!-- UPS / Server -->
  <rect x="340" y="245" width="20" height="18" rx="1" fill="none" stroke="#3d5575" stroke-width="0.6"/>
  <text x="350" y="257" font-family="monospace" font-size="4" fill="#3d5575" text-anchor="middle">UPS</text>

  <!-- ===== JETTY / LOADING (right side) ===== -->
  <rect x="540" y="140" width="160" height="130" rx="1" fill="#00e5ff08" stroke="#2a3555" stroke-width="1.5"/>
  <text x="620" y="158" font-family="monospace" font-size="9" fill="#5a7aa0" text-anchor="middle">MARINE LOADING</text>
  <!-- Jetty arm structure -->
  <line x1="560" y1="200" x2="690" y2="200" stroke="#5a7aa0" stroke-width="2"/>
  <line x1="560" y1="220" x2="690" y2="220" stroke="#5a7aa0" stroke-width="2"/>
  <!-- Loading arms -->
  <g transform="translate(640, 210)">
    <line x1="0" y1="-15" x2="20" y2="-25" stroke="#5a7aa0" stroke-width="1.5"/>
    <line x1="20" y1="-25" x2="35" y2="-15" stroke="#5a7aa0" stroke-width="1.5"/>
    <circle cx="20" cy="-25" r="3" fill="none" stroke="#5a7aa0" stroke-width="0.8"/>
  </g>
  <text x="660" y="195" font-family="monospace" font-size="5" fill="#5a7aa0" text-anchor="middle">LOADING ARM</text>
  <!-- Berth markers -->
  <rect x="560" y="235" width="130" height="15" rx="0" fill="#00e5ff08" stroke="#00e5ff20" stroke-width="0.5"/>
  <text x="625" y="246" font-family="monospace" font-size="5" fill="#00e5ff40" text-anchor="middle">BERTH 1 — LNG CARRIER</text>
  <!-- Mooring dolphins -->
  <circle cx="565" cy="255" r="4" fill="none" stroke="#3d5575" stroke-width="0.8"/>
  <circle cx="625" cy="255" r="4" fill="none" stroke="#3d5575" stroke-width="0.8"/>
  <circle cx="685" cy="255" r="4" fill="none" stroke="#3d5575" stroke-width="0.8"/>
  <text x="625" y="268" font-family="monospace" font-size="4" fill="#3d5575" text-anchor="middle">MOORING DOLPHINS</text>

  <!-- ===== ADMINISTRATION (bottom-left) ===== -->
  <rect x="40" y="310" width="130" height="80" rx="1" fill="#00e5ff08" stroke="#2a3555" stroke-width="1.5"/>
  <text x="105" y="328" font-family="monospace" font-size="9" fill="#5a7aa0" text-anchor="middle">ADMIN</text>
  <!-- Offices -->
  <rect x="50" y="340" width="22" height="14" rx="1" fill="none" stroke="#3d5575" stroke-width="0.5"/>
  <rect x="50" y="360" width="22" height="14" rx="1" fill="none" stroke="#3d5575" stroke-width="0.5"/>
  <rect x="80" y="340" width="22" height="14" rx="1" fill="none" stroke="#3d5575" stroke-width="0.5"/>
  <rect x="80" y="360" width="22" height="14" rx="1" fill="none" stroke="#3d5575" stroke-width="0.5"/>
  <!-- Conference room -->
  <rect x="115" y="340" width="40" height="30" rx="1" fill="none" stroke="#3d5575" stroke-width="0.5"/>
  <text x="135" y="358" font-family="monospace" font-size="5" fill="#3d5575" text-anchor="middle">CONF.</text>

  <!-- ===== SAFETY STATION (bottom-center-left) ===== -->
  <rect x="180" y="310" width="110" height="80" rx="1" fill="#ff444408" stroke="#ff444460" stroke-width="1.5"/>
  <text x="235" y="328" font-family="monospace" font-size="8" fill="#ff6666" text-anchor="middle">SAFETY STATION</text>
  <!-- Safety equipment -->
  <rect x="190" y="340" width="30" height="20" rx="1" fill="none" stroke="#ff444040" stroke-width="0.6"/>
  <text x="205" y="354" font-family="monospace" font-size="4" fill="#ff444060" text-anchor="middle">SCBA</text>
  <rect x="230" y="340" width="30" height="20" rx="1" fill="none" stroke="#ff444040" stroke-width="0.6"/>
  <text x="245" y="354" font-family="monospace" font-size="4" fill="#ff444060" text-anchor="middle">HAZMAT</text>
  <!-- Emergency shower -->
  <g transform="translate(210, 378)">
    <line x1="0" y1="0" x2="0" y2="-8" stroke="#22c55e60" stroke-width="1"/>
    <path d="M-5,-8 L5,-8" stroke="#22c55e60" stroke-width="1"/>
    <circle r="2" cy="3" fill="#00e5ff20" stroke="none"/>
  </g>
  <text x="210" y="392" font-family="monospace" font-size="4" fill="#22c55e60" text-anchor="middle">E-SHOWER</text>

  <!-- ===== EMERGENCY ASSEMBLY (bottom-center) ===== -->
  <g transform="translate(380, 350)">
    <rect x="-35" y="-15" width="70" height="30" rx="2" fill="#22c55e10" stroke="#22c55e" stroke-width="0.8" opacity="0.5"/>
    <text x="0" y="-3" font-family="monospace" font-size="6" fill="#22c55e80" text-anchor="middle">EMERGENCY</text>
    <text x="0" y="6" font-family="monospace" font-size="6" fill="#22c55e80" text-anchor="middle">ASSEMBLY</text>
  </g>

  <!-- ===== SUBSTATION (bottom-right) ===== -->
  <rect x="480" y="310" width="100" height="80" rx="1" fill="#00e5ff08" stroke="#2a3555" stroke-width="1.5"/>
  <text x="530" y="328" font-family="monospace" font-size="8" fill="#5a7aa0" text-anchor="middle">SUBSTATION</text>
  <!-- Transformer symbols -->
  <g transform="translate(510, 360)">
    <circle r="10" fill="none" stroke="#ffd60040" stroke-width="0.8"/>
    <circle r="10" cx="12" fill="none" stroke="#ffd60040" stroke-width="0.8"/>
  </g>
  <text x="516" y="380" font-family="monospace" font-size="4" fill="#ffd60060" text-anchor="middle">33kV / 11kV</text>
  <!-- HV warning -->
  <g transform="translate(555, 350)">
    <rect x="-4" y="-5" width="8" height="10" rx="0.5" fill="none" stroke="#ffd600" stroke-width="0.6" opacity="0.5"/>
    <path d="M-1,-3 L1,0 L-1,3" stroke="#ffd600" stroke-width="0.5" fill="none" opacity="0.5"/>
  </g>

  <!-- ===== WATER TREATMENT (bottom-right) ===== -->
  <rect x="590" y="310" width="110" height="80" rx="1" fill="#00e5ff08" stroke="#2a3555" stroke-width="1.5"/>
  <text x="645" y="325" font-family="monospace" font-size="7" fill="#5a7aa0" text-anchor="middle">WATER TREAT.</text>
  <!-- Settling tanks -->
  <circle cx="620" cy="360" r="15" fill="none" stroke="#3d5575" stroke-width="0.8"/>
  <circle cx="665" cy="360" r="15" fill="none" stroke="#3d5575" stroke-width="0.8"/>
  <text x="620" y="363" font-family="monospace" font-size="4" fill="#3d5575" text-anchor="middle">SETTLE</text>
  <text x="665" y="363" font-family="monospace" font-size="4" fill="#3d5575" text-anchor="middle">FILTER</text>

  <!-- ===== MAIN ROAD ===== -->
  <rect x="40" y="290" width="660" height="18" rx="0" fill="#0d1525" stroke="#1e274480" stroke-width="0.5"/>
  <text x="370" y="303" font-family="monospace" font-size="6" fill="#2a3555" text-anchor="middle" letter-spacing="3">MAIN ACCESS ROAD</text>
  <!-- Service corridor (vertical, right) -->
  <rect x="720" y="30" width="25" height="440" rx="0" fill="#0d1525" stroke="#1e274480" stroke-width="0.5"/>
  <text x="732" y="250" font-family="monospace" font-size="6" fill="#2a3555" text-anchor="middle" transform="rotate(90, 732, 250)" letter-spacing="2">PERIMETER ROAD</text>

  <!-- ===== ENTRY GATE ===== -->
  <rect x="20" y="420" width="60" height="3" fill="#00e5ff" opacity="0.6"/>
  <text x="50" y="445" font-family="monospace" font-size="7" fill="#5a7aa0" text-anchor="middle">MAIN GATE</text>
  <rect x="22" y="416" width="4" height="10" fill="#2a3555"/>
  <rect x="74" y="416" width="4" height="10" fill="#2a3555"/>
  <path d="M50 460 L50 450 M45 455 L50 450 L55 455" stroke="#5a7aa0" stroke-width="1" fill="none"/>

  <!-- ===== DOOR SYMBOLS ===== -->
  <line x1="320" y1="290" x2="340" y2="290" stroke="#00e5ff40" stroke-width="2"/>
  <line x1="170" y1="310" x2="170" y2="330" stroke="#00e5ff40" stroke-width="2"/>
  <line x1="540" y1="200" x2="540" y2="220" stroke="#00e5ff40" stroke-width="2"/>
  <line x1="470" y1="220" x2="470" y2="240" stroke="#00e5ff40" stroke-width="2"/>
  <line x1="710" y1="180" x2="710" y2="200" stroke="#00e5ff40" stroke-width="2"/>

  <!-- ===== CAMERA SYMBOLS ===== -->
  <g transform="translate(50, 50)">
    <circle r="3" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.6"/>
    <circle r="1" fill="#00e5ff" opacity="0.6"/>
    <text x="6" y="3" font-family="monospace" font-size="4" fill="#00e5ff80">CAM1</text>
  </g>
  <g transform="translate(340, 50)">
    <circle r="3" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.6"/>
    <circle r="1" fill="#00e5ff" opacity="0.6"/>
    <text x="6" y="3" font-family="monospace" font-size="4" fill="#00e5ff80">CAM2</text>
  </g>
  <g transform="translate(550, 145)">
    <circle r="3" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.6"/>
    <circle r="1" fill="#00e5ff" opacity="0.6"/>
    <text x="6" y="3" font-family="monospace" font-size="4" fill="#00e5ff80">CAM3</text>
  </g>
  <g transform="translate(50, 420)">
    <circle r="3" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.6"/>
    <circle r="1" fill="#00e5ff" opacity="0.6"/>
    <text x="6" y="3" font-family="monospace" font-size="4" fill="#00e5ff80">CAM4</text>
  </g>

  <!-- ===== FIRE EXTINGUISHERS ===== -->
  <g transform="translate(320, 290)">
    <rect x="-2" y="-3" width="4" height="6" rx="1" fill="#ff4444" opacity="0.3"/>
    <text x="5" y="2" font-family="monospace" font-size="3.5" fill="#ff444460">FE</text>
  </g>
  <g transform="translate(530, 290)">
    <rect x="-2" y="-3" width="4" height="6" rx="1" fill="#ff4444" opacity="0.3"/>
    <text x="5" y="2" font-family="monospace" font-size="3.5" fill="#ff444460">FE</text>
  </g>

  <!-- ===== GAS DETECTORS ===== -->
  <g transform="translate(270, 100)">
    <circle r="3" fill="none" stroke="#ff666680" stroke-width="0.6"/>
    <text x="5" y="2" font-family="monospace" font-size="3.5" fill="#ff666660">GD</text>
  </g>
  <g transform="translate(470, 100)">
    <circle r="3" fill="none" stroke="#ff666680" stroke-width="0.6"/>
    <text x="5" y="2" font-family="monospace" font-size="3.5" fill="#ff666660">GD</text>
  </g>
  <g transform="translate(560, 170)">
    <circle r="3" fill="none" stroke="#ff666680" stroke-width="0.6"/>
    <text x="5" y="2" font-family="monospace" font-size="3.5" fill="#ff666660">GD</text>
  </g>

  <!-- ===== NORTH ARROW ===== -->
  <g transform="translate(740, 55)">
    <polygon points="0,-18 -6,0 0,-8 6,0" fill="#5a7aa0" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="10" stroke="#5a7aa0" stroke-width="1" opacity="0.5"/>
    <text x="0" y="-22" font-family="monospace" font-size="8" fill="#5a7aa0" text-anchor="middle" font-weight="bold">N</text>
  </g>

  <!-- ===== SCALE BAR ===== -->
  <g transform="translate(680, 470)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#5a7aa0" stroke-width="1"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#5a7aa0" stroke-width="1"/>
    <line x1="60" y1="-3" x2="60" y2="3" stroke="#5a7aa0" stroke-width="1"/>
    <line x1="30" y1="-2" x2="30" y2="2" stroke="#5a7aa0" stroke-width="0.5"/>
    <text x="30" y="12" font-family="monospace" font-size="6" fill="#5a7aa0" text-anchor="middle">25m</text>
  </g>

  <!-- ===== TITLE BLOCK ===== -->
  <g transform="translate(40, 470)">
    <text font-family="monospace" font-size="7" fill="#3d5575">DARWIN LNG TERMINAL</text>
    <text y="10" font-family="monospace" font-size="5" fill="#2a3555">DWG: DLT-FP-001 REV.1 | SCALE 1:500 | MERIDIAN MINING SERVICES</text>
  </g>
</svg>